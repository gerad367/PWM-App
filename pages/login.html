<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login - MoodMeal</title>

    <script src="../assets/js/cookies.js"></script>
    <script>
        if (getCookie("userLogged") === "true") {
            window.location.pathname = "/PWM-App/pages/settings.html"
        }
    </script>

    <link rel="stylesheet" href="../assets/css/login.css">

    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css">
</head>
<body>
    <header id="header-template"></header>
    <aside id="sidebar-template"></aside>

    <main class="contenedor-login">

        <!-- LADO IZQUIERDO -->
        <section class="lado-izquierdo">
            <div class="overlay"></div>

            <div class="contenido-izquierda">
                <h1>MOODMEAL</h1>
                <p>Encuentra restaurantes según cómo te sientas hoy</p>
            </div>
        </section>

        <!-- LADO DERECHO -->
        <section class="lado-derecho">

            <div class="form-container">

                <!-- Icono usuario -->
                <div class="icono-usuario">
                    <img src="../assets/images/icono_usuario.png" alt="Usuario">
                </div>

                <h2>Iniciar sesión</h2>

                <form id="login-form">

                    <div class="grupo-input">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Introduce tu usuario" required>
                    </div>

                    <div class="grupo-input">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" required>
                    </div>

                    <button type="submit" class="boton-login">Login</button>

                </form>

                <div class="links-extra">
                    <a href="#">¿No tienes cuenta? Regístrate</a>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

            </div>

        </section>

    </main>

    <footer id="footer-template"></footer>
    <script src="../assets/js/templates.js"></script>

    <script>
        const usernameField = document.querySelector("#username");
        const passwordField = document.querySelector("#password");
        const form = document.querySelector("#login-form");

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            fetch("../assets/database/users.json")
                .then(response => response.json())
                .then(data => {
                    let user = usernameField.value;
                    let passwd = passwordField.value;

                    let match = data.users.find((e) => e.name === user);
                    if (match.passwd === passwd) {
                        setCookie("userLogged", "true", 30);
                        setCookie("username", user, 30);
                        setCookie("email", match.mail, 30);
                        window.location.pathname = "/PWM-App/pages/home.html";

                    } else {
                        passwordField.value = null;
                    }
                });
        })

    </script>

</body>
</html>
